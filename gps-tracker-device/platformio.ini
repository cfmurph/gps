; PlatformIO Project Configuration
; GPS Tracker Device — ESP32 + SIM7600 LTE + NEO-M8N + SSD1306 + SD

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    ; GPS parsing
    mikalhart/TinyGPSPlus @ ^1.0.3
    ; LTE / GSM modem abstraction
    vshymanskyy/TinyGSM @ ^0.11.7
    ; HTTP client layered on TinyGSM
    vshymanskyy/StreamDebugger @ ^1.0.1
    arduino-libraries/ArduinoHttpClient @ ^0.6.1
    ; OLED display (SSD1306 / SH1106)
    olikraus/U8g2 @ ^2.35.19
    ; SD card
    arduino-libraries/SD @ ^1.2.4
    ; ArduinoJSON for payload serialisation
    bblanchon/ArduinoJson @ ^7.2.0

; Separate environment for unit tests (native host)
[env:native]
platform = native
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
test_framework = unity
