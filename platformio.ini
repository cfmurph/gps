; PlatformIO Project Configuration
; GPS Tracker Device — ESP32 + SIM7600 LTE + NEO-M8N + SSD1306 + SD

; ---------------------------------------------------------------------------
; Shared settings inherited by all environments
; ---------------------------------------------------------------------------
[common]
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    vshymanskyy/TinyGSM @ ^0.11.7
    arduino-libraries/ArduinoHttpClient @ ^0.6.1
    olikraus/U8g2 @ ^2.35.19
    arduino-libraries/SD @ ^1.2.4
    bblanchon/ArduinoJson @ ^7.2.0

; ---------------------------------------------------------------------------
; ESP32-WROOM-32 (no PSRAM) — most common devkit module
; ---------------------------------------------------------------------------
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags   = -DCORE_DEBUG_LEVEL=1
lib_deps      = ${common.lib_deps}

; ---------------------------------------------------------------------------
; ESP32-WROVER (4 MB PSRAM) — enables large in-RAM queue via ps_malloc
; ---------------------------------------------------------------------------
[env:esp32wrover]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
build_flags   =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps      = ${common.lib_deps}

; ---------------------------------------------------------------------------
; Native host — unit tests (Unity framework)
; ---------------------------------------------------------------------------
[env:native]
platform       = native
lib_deps       = bblanchon/ArduinoJson @ ^7.2.0
test_framework = unity
